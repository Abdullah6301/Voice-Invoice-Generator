<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Generator - Customers</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>Invoice Generator</h1>
                <p>AI-Powered Smart Invoicing</p>
            </div>
            <nav class="sidebar-nav">
                <a href="/"><span>Dashboard</span></a>
                <a href="/customers-page" class="active"><span>Customers</span></a>
                <a href="/invoices-page"><span>Invoices</span></a>
                <a href="/dataset-page"><span>Items</span></a>
                <div class="divider"></div>
                <a href="/settings-page"><span>Settings</span></a>
                <a href="/logout"><span>Logout</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h2>Customer Management</h2>
                <button class="btn btn-primary" onclick="openModal('customerModal')">+ Add Customer</button>
            </div>

            <div class="search-bar">
                <input type="text" id="customerSearch" placeholder="Search customers by name, phone, or email..." onkeyup="loadCustomers()">
            </div>

            <div class="card">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>Address</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="customersBody">
                        <tr><td colspan="6" class="loading"><div class="spinner"></div></td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Add Customer Modal -->
    <div class="modal-overlay" id="customerModal">
        <div class="modal">
            <h3>Add New Customer</h3>
            <form onsubmit="createCustomer(event)">
                <div class="form-group">
                    <label>Name *</label>
                    <input type="text" name="name" required placeholder="Customer full name">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" name="phone" placeholder="Phone number">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="Email address">
                    </div>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" name="address" placeholder="Street address">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" name="city" placeholder="City">
                    </div>
                    <div class="form-group">
                        <label>State</label>
                        <input type="text" name="state" placeholder="State">
                    </div>
                </div>
                <div class="form-group">
                    <label>Zip Code</label>
                    <input type="text" name="zip_code" placeholder="Zip code">
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea name="notes" rows="2" placeholder="Additional notes"></textarea>
                </div>
                <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:16px">
                    <button type="button" class="btn btn-outline" onclick="closeModal('customerModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Customer</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadCustomers);
    </script>
</body>
</html>
